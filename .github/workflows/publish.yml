name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # Required for OIDC Trusted Publishing

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Verify tag matches pyproject.toml version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        PYVER=$(python -c "import tomllib; f = open('pyproject.toml', 'rb'); d = tomllib.load(f); print(d['project']['version'])")
        if [ "v$PYVER" != "$TAG" ]; then
          echo "Tag $TAG does not match pyproject.toml version v$PYVER"
          exit 1
        fi
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
        
    - name: Build package
      run: python -m build
      
    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
